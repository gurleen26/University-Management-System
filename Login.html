<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<title>University Management System</title>
	<link rel="stylesheet" href="styles.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.2/css/fontawesome.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<script>
        function showAlert() {
            alert("Data entered successfully");
        }
	</script>
</head>
<body>
	<!---Login page--->

	<section class="login-header">
		<div class="login-container">
			<h1>Login</h1>
				
				<input type="text" id="username" name="username" placeholder="Enter the username:" required>
				<input type="password" id="password" name="password" placeholder="Enter the password:" required>
				<select id="mySelect"  class="select">
					<option value="">Select</option>
					<option value="Dashboard">Dashboard</option>
					<option value="Hostel Booking">Hostel Booking</option>
					<option value="Home Page">Home Page</option>
					<option value="Assignment upload">Assignment upload</option>
					<option value="View Time-Table">View Time-Table</option>
				</select>
				<button type="submit" class="btn red-btn" onclick="showAlert()">Login</button>
		
		</div>
		</section>
</body>
</html>
